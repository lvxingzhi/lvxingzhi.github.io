# Butterfly 主题配置
# 文档: https://butterfly.js.org/

# 导航菜单
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  关于: /about/ || fas fa-heart

# 代码高亮主题
highlight_theme: mac dark

# 代码复制
highlight_copy: true

# 代码语言显示
highlight_lang: true

# 代码收缩
highlight_shrink: false

# 代码换行
code_word_wrap: true

# 社交图标
social:
  fab fa-github: https://github.com/lvxingzhi || Github || '#24292e'
  fas fa-envelope: mailto:349024548@qq.com || Email || '#ea4335'

# 头像
avatar:
  img: /images/myhead.jpg
  effect: true

# 网站图标
favicon: /images/myhead.jpg

# 侧边栏设置
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 记录,思考,成长,回忆
    button:
      enable: false
  card_announcement:
    enable: false
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 40
    color: true
    orderby: random
    order: 1
    sort_order:
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
    sort_order:

# 访问统计
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# 美化
beautify:
  enable: true
  field: site
  title-prefix-icon: '\f0e7'
  title-prefix-icon-color: '#49b1f5'

# 字体设置
font:
  global-font-size: 16px
  code-font-size: 15px
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica Neue, Arial, PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif
  code-font-family: JetBrains Mono, Fira Code, Consolas, Monaco, Courier New, monospace

# 网站背景
background:

# 页脚设置
footer:
  owner:
    enable: true
    since: 2020
  custom_text:
  copyright: true

# 阅读模式
readmode: true

# 夜间模式
darkmode:
  enable: true
  button: true
  autoChangeMode: 1

# 图片懒加载
lazyload:
  enable: true
  field: site
  placeholder:
  blur: true

# 图片放大
medium_zoom: true

# 文章元信息
post_meta:
  page:
    date_type: both
    date_format: relative
    categories: true
    tags: true
    label: true
  post:
    date_type: both
    date_format: relative
    categories: true
    tags: true
    label: true

# 文章版权
post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 打赏
reward:
  enable: false

# 目录
toc:
  post: true
  page: false
  number: true
  expand: true
  style_simple: false
  scroll_percent: true

# 相关文章
related_post:
  enable: true
  limit: 6
  date_type: created

# 锚点
anchor:
  button:
    enable: false
  auto_update: false

# 图片描述
photofigcaption: true

# 复制设置
copy:
  enable: true
  copyright:
    enable: false

# 搜索
local_search:
  enable: true
  preload: false
  CDN:

# 注入CSS
inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">

# 数学公式
mathjax:
  enable: false

# 页面加载动画
preloader:
  enable: true
  source: 1
  pace_css_url:

# 右下角按钮
rightside_item_order:
  enable: false
  hide: false
  show: true
