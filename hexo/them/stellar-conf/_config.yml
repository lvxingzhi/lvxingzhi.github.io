# Stellar 主题配置
# 文档: https://xaoxuu.com/wiki/stellar/

######## 站点信息 ########
open_graph:
  enable: true
  twitter_id:

######## 导航栏 ########
menubar:
  columns:
    - name: 博客
      icon: fa-solid fa-rss
      url: /
    - name: 归档
      icon: fa-solid fa-archive
      url: /archives/
    - name: 标签
      icon: fa-solid fa-tags
      url: /tags/
    - name: 分类
      icon: fa-solid fa-folder-open
      url: /categories/
    - name: 关于
      icon: fa-solid fa-heart
      url: /about/

######## 侧边栏 ########
sidebar:
  logo:
    avatar: /images/myhead.jpg
    title: LXZ
    subtitle: 记录,思考,成长,回忆
  menu:
    post:
      - '[btn.blog](/)'
      - '[btn.wiki](/wiki/)'
    wiki:
      - '[btn.blog](/)'
      - '[btn.wiki](/wiki/)'
  widgets:
    home:
      - welcome
      - recent
    blog:
      - recent
      - tagcloud
    wiki:
      - recent
    post:
      - toc
      - recent
    page:
      - toc

######## 文章布局 ########
article:
  auto_cover: false
  auto_excerpt: 200
  license: 本文采用 [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/) 许可协议
  share:
  related_posts:
    enable: true
    max_count: 5

######## 评论 ########
comments:
  service:
  
######## 搜索 ########
search:
  service: local_search
  local_search:

######## 页脚 ########
footer:
  social:
    github:
      icon: fa-brands fa-github
      url: https://github.com/lvxingzhi
    email:
      icon: fa-solid fa-envelope
      url: mailto:349024548@qq.com
  sitemap:
    - '[博客](/)'
    - '[归档](/archives/)'
    - '[标签](/tags/)'
    - '[分类](/categories/)'
  content: |
    <i class="fa-solid fa-robot"></i> AI-Powered Knowledge Base
    本站由 [Hexo](https://hexo.io) 驱动 | 主题 [Stellar](https://github.com/xaoxuu/hexo-theme-stellar)

######## 样式 ########
style:
  darkmode: auto
  smooth_scroll: true
  font_size:
    root: 16px
    body: 1rem
    code: 0.9375rem
  font_family:
    logo: 'system-ui, "Microsoft Yahei", "Segoe UI", -apple-system, Roboto, Ubuntu, "Helvetica Neue", Arial, "WenQuanYi Micro Hei", sans-serif'
    body: 'system-ui, "Microsoft Yahei", "Segoe UI", -apple-system, Roboto, Ubuntu, "Helvetica Neue", Arial, "WenQuanYi Micro Hei", sans-serif'
    code: 'Menlo, Monaco, Consolas, "Courier New", monospace'
  color:
    theme: '#1BCDFC'
    accent: '#1BCDFC'
    background: '#f5f5f5'
    card: '#fff'
    text: '#333'
    block: '#f6f6f6'
    codeblock: '#f6f6f6'
    shadow: 'rgba(0, 0, 0, 0.1)'

######## 插件 ########
plugins:
  preload:
    enable: true
    service: instant_page
  lazyload:
    enable: true
    service: lozad
  image_viewer:
    enable: true
    service: fancybox

######## 标签插件 ########
tag_plugins:
  note:
    default_color: info
  link:
    placeholder: /images/myhead.jpg
  timeline:
    max_height: 80vh

######## 其他 ########
analytics:
  busuanzi:
    enable: true

inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
